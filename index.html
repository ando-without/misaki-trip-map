<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>거북이는 의외로 빨리 헤엄친다 — 미사키 촬영지 여행</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* 「亀は意外と速く泳ぐ」 레트로 쇼와 항구마을 포스터 팔레트 */
  --paper:#ece2cb;        /* 빛바랜 크림 종이 */
  --paper-2:#e2d6b9;
  --card:#fbf6e9;         /* 카드 종이 (밝음) */
  --ink:#2b2620;          /* 따뜻한 먹색 */
  --ink2:#4c453a;
  --ink3:#7c7261;
  --tan:#cdbf9e;          /* 종이 경계선 */
  --tan-d:#b6a47e;
  --green:#5d7544;        /* 타이틀 올리브 그린 (주) */
  --green-d:#42562f;
  --red:#c2402a;          /* 스파이 스티커 버밀리온 (강조·마커) */
  --red-d:#9c3019;
  --mustard:#d29a32;
  --shadow:0 2px 10px rgba(60,48,28,.14),0 1px 3px rgba(60,48,28,.10);
  --shadow-lg:0 10px 34px rgba(60,48,28,.22),0 2px 8px rgba(60,48,28,.12);
  --font:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,Roboto,'Helvetica Neue','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
}
body{font-family:var(--font);background:var(--paper);color:var(--ink);height:100vh;height:100dvh;
     display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased;cursor:none}
a{cursor:none}

/* HEADER — 영화 포스터 띠 */
header{position:relative;z-index:1000;flex-shrink:0;
       background:
         repeating-linear-gradient(90deg, var(--ink) 0 14px, transparent 14px 30px) top/100% 8px no-repeat,
         repeating-linear-gradient(90deg, var(--ink) 0 14px, transparent 14px 30px) bottom/100% 8px no-repeat,
         linear-gradient(180deg,#f1e8d2,#e7dcc0);
       border-bottom:2px solid var(--green-d);
       padding:1rem 1.2rem .85rem;display:flex;align-items:center;gap:.85rem}
.hd-icon{width:46px;height:46px;border-radius:50%;flex-shrink:0;
         background-size:cover;background-position:center 18%;
         border:3px solid var(--card);box-shadow:0 0 0 2px var(--green-d),var(--shadow);
         filter:saturate(1.05) contrast(1.03)}
.hd-text{flex:1;min-width:0}
.hd-title{font-size:1.06rem;font-weight:800;color:var(--green-d);letter-spacing:-.01em;
          line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hd-sub{font-size:.7rem;color:var(--red-d);font-weight:600;margin-top:.18rem;letter-spacing:.02em}
.hd-route-btn{display:inline-flex;align-items:center;gap:.4rem;
              background:var(--red);color:#fff;text-decoration:none;
              font-size:.72rem;font-weight:700;padding:.46rem .95rem;
              border-radius:4px;white-space:nowrap;flex-shrink:0;
              box-shadow:0 2px 0 var(--red-d);letter-spacing:.02em}
.hd-route-btn:hover{background:var(--red-d);transform:translateY(1px);box-shadow:0 1px 0 var(--red-d)}

/* LAYOUT */
.layout{display:flex;flex:1;min-height:0;position:relative}
#map{flex:1;min-width:0;background:#e8eaed}
.sidebar{width:344px;flex-shrink:0;display:flex;flex-direction:column;
         background:var(--paper);border-left:2px solid var(--tan-d);position:relative;z-index:100}
.sb-head{padding:.85rem 1rem .7rem;background:linear-gradient(180deg,#efe6cf,#e7dcc0);
         border-bottom:1px solid var(--tan-d);flex-shrink:0}
.sb-head-title{font-size:.86rem;font-weight:800;color:var(--green-d);letter-spacing:.01em}
.sb-head-sub{font-size:.66rem;color:var(--ink3);margin-top:.14rem}
.itinerary{overflow-y:auto;flex:1;padding:.7rem .8rem;scroll-behavior:smooth;
           display:flex;flex-direction:column;gap:.55rem}
.itinerary>*{flex:0 0 auto}   /* 자식 높이 유지(찌부러짐 방지) — 컨테이너만 스크롤 */
.itinerary::-webkit-scrollbar{width:6px}
.itinerary::-webkit-scrollbar-thumb{background:var(--tan-d);border-radius:3px}
.itinerary::-webkit-scrollbar-track{background:transparent}

/* STATUS BANNER */
.status-banner{display:none;font-size:.66rem;color:#7c2d12;background:#f6e2c4;
  border:1px solid var(--tan-d);border-radius:8px;padding:.45rem .6rem;margin:.5rem .8rem 0;line-height:1.5}
.status-banner.show{display:block}
.status-banner code{background:rgba(0,0,0,.06);padding:.05rem .25rem;border-radius:4px;font-size:.62rem}

/* STOP CARD — 영화 티켓 느낌 */
.stop-card{background:var(--card);border-radius:6px;box-shadow:var(--shadow);
           overflow:hidden;cursor:none;
           transition:transform .12s,box-shadow .12s;border:1px solid var(--tan)}
.stop-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.stop-card.active{border-color:var(--red);box-shadow:0 0 0 2px rgba(194,64,42,.35),var(--shadow)}
.sc-time-bar{background:var(--green);padding:.36rem .8rem;
             display:flex;align-items:center;justify-content:space-between;
             border-bottom:2px dashed rgba(255,255,255,.35)}
.sc-time-bar.end{background:var(--red)}
.sc-time{font-size:.75rem;font-weight:800;color:#fdf8ec;font-variant-numeric:tabular-nums;letter-spacing:.02em}
.sc-duration{font-size:.63rem;color:rgba(253,248,236,.85)}
.sc-img{height:122px;overflow:hidden;background:var(--paper-2);position:relative}
.sc-img img{width:100%;height:122px;object-fit:cover;display:block;filter:saturate(1.05)}
.sc-img-overlay{position:absolute;bottom:0;left:0;right:0;
                background:linear-gradient(transparent,rgba(31,24,12,.78));padding:.4rem .75rem .5rem}
.sc-scene-label{font-size:.57rem;color:var(--mustard);display:block;margin-bottom:.06rem;letter-spacing:.06em;font-weight:700;text-transform:uppercase}
.sc-scene-text{font-size:.71rem;color:#fff;font-weight:600;line-height:1.35}
.sc-body{padding:.72rem .82rem .68rem}
.sc-num-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.32rem}
.sc-num{width:25px;height:25px;border-radius:50%;background:var(--red);color:#fdf8ec;
        font-size:.68rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;
        box-shadow:0 1px 2px rgba(0,0,0,.25)}
.sc-num.end{background:var(--green)}
.sc-name{font-size:.9rem;font-weight:800;color:var(--ink);line-height:1.25}
.sc-jp{font-size:.64rem;color:var(--ink3)}
.sc-tags{display:flex;flex-wrap:wrap;gap:.24rem;margin:.44rem 0 .4rem}
.sc-tag{font-size:.59rem;font-weight:700;padding:.12rem .46rem;border-radius:3px;letter-spacing:.01em}
.sc-tag.film{background:#e7ecd9;color:var(--green-d)}
.sc-tag.food{background:#f6e0d3;color:var(--red-d)}
.sc-tag.cafe{background:#f5e6c4;color:#8a5a12}
.sc-tag.view{background:#dde7d4;color:#3f5532}
.sc-food{font-size:.68rem;color:var(--ink2);line-height:1.45;margin-bottom:.46rem}
.sc-maplink{display:inline-flex;align-items:center;gap:.32rem;
            background:var(--red);color:#fff !important;text-decoration:none;
            font-size:.69rem;font-weight:700;padding:.36rem .8rem;border-radius:4px;
            box-shadow:0 2px 0 var(--red-d);letter-spacing:.01em}
.sc-maplink:hover{background:var(--red-d);transform:translateY(1px);box-shadow:0 1px 0 var(--red-d)}

/* TRANSIT CONNECTOR */
.transit-connector{display:flex;align-items:stretch;gap:.6rem;padding:0 .8rem}
.tc-line-col{display:flex;flex-direction:column;align-items:center;padding:.1rem 0;flex-shrink:0;margin-left:5px}
.tc-dot{width:8px;height:8px;border-radius:50%;background:var(--tan-d);flex-shrink:0}
.tc-line{flex:1;width:2px;background:var(--tan-d);margin:.15rem 0}
.tc-pill{background:var(--card);border:1px solid var(--tan);border-radius:5px;
         padding:.28rem .65rem;display:flex;align-items:center;gap:.4rem;align-self:center;flex:1;
         box-shadow:0 1px 2px rgba(60,48,28,.08)}
.tc-mode{font-size:.66rem;font-weight:700;color:var(--green-d);white-space:nowrap}
.tc-detail{font-size:.63rem;color:var(--ink2);line-height:1.3}
.tc-time{font-size:.7rem;font-weight:800;color:var(--red-d);margin-left:auto;white-space:nowrap;font-variant-numeric:tabular-nums}

/* ACCOM */
.accom-card{background:var(--card);border-radius:6px;box-shadow:var(--shadow);
            padding:.82rem;margin:0;border:1px solid var(--tan)}
.accom-title{font-size:.78rem;font-weight:800;color:var(--green-d);margin-bottom:.45rem}
.accom-row{font-size:.68rem;color:var(--ink2);line-height:1.55;padding:.18rem 0;border-top:1px solid var(--tan)}
.accom-row:first-of-type{border-top:none}
.accom-name{font-weight:700;color:var(--red-d)}

/* MAP PIN (OverlayView) */
.ap-pin{display:flex;flex-direction:column;align-items:center;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4));transition:transform .12s}
.ap-pin:hover{transform:scale(1.14)}
.ap-pin-head{width:29px;height:29px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);
             background:var(--red);display:flex;align-items:center;justify-content:center;border:2.5px solid #fdf8ec}
.ap-pin-head.end{background:var(--green)}
.ap-pin-label{transform:rotate(45deg);font-size:11px;font-weight:800;color:#fdf8ec;line-height:1}
.ap-pin-tail{width:2px;height:6px;background:var(--red);margin-top:-1px}
.ap-pin-tail.end{background:var(--green)}

/* INFO WINDOW */
.gm-style-iw.gm-style-iw-c{padding:0 !important;border-radius:8px !important;overflow:hidden !important;
  box-shadow:0 10px 34px rgba(60,48,28,.28) !important;max-width:300px !important;border:1px solid var(--tan) !important}
.gm-style-iw-d{overflow:hidden !important;max-width:300px !important}
.pop-img{height:155px;overflow:hidden;background:var(--paper-2);position:relative}
.pop-img img{width:100%;height:155px;object-fit:cover;display:block;filter:saturate(1.05)}
.pop-img-overlay{position:absolute;bottom:0;left:0;right:0;
                 background:linear-gradient(transparent,rgba(31,24,12,.8));padding:.42rem .85rem .58rem}
.pop-scene-label{font-size:.56rem;color:var(--mustard);display:block;margin-bottom:.08rem;letter-spacing:.06em;font-weight:700;text-transform:uppercase}
.pop-scene-text{font-size:.72rem;color:#fff;font-weight:600;line-height:1.4}
.pop-body{padding:13px 15px 15px;font-family:var(--font);background:var(--card)}
.pop-stop-badge{display:inline-flex;align-items:center;background:var(--red);color:#fdf8ec;
               border-radius:3px;padding:.13rem .46rem;font-size:.6rem;font-weight:800;margin-bottom:.4rem;letter-spacing:.03em}
.pop-stop-badge.end{background:var(--green)}
.pop-time{font-size:.66rem;font-weight:700;color:var(--red-d);margin-bottom:.06rem}
.pop-name{font-size:1rem;font-weight:800;color:var(--ink);line-height:1.25}
.pop-jp{font-size:.68rem;color:var(--ink3)}
.pop-area{font-size:.63rem;color:var(--ink3);margin-top:.12rem;opacity:.8}
.pop-divider{border:none;border-top:1px dashed var(--tan-d);margin:.62rem 0}
.pop-sec{margin-top:.6rem}
.pop-sec:first-of-type{margin-top:0}
.pop-sec-h{display:block;font-size:.62rem;font-weight:800;color:var(--green-d);letter-spacing:.02em;margin-bottom:.16rem}
.pop-sec-b{font-size:.71rem;color:var(--ink2);line-height:1.5}
.pop-sec.scene .pop-sec-h{color:var(--red-d)}

/* 카드 안 상세 섹션 (데스크톱: 인라인 / 모바일: 숨김 → 더보기 시트) */
.sc-detail{margin-top:.55rem;padding-top:.55rem;border-top:1px dashed var(--tan-d)}
.sc-transit-inline{display:none}   /* 모바일 캐러셀에서만 노출 */
.sc-actions{display:flex;align-items:stretch;gap:.5rem;margin-top:.5rem}
.sc-actions .sc-maplink{margin-top:0}
.sc-more{display:none;flex:1;justify-content:center;padding:.42rem;cursor:none;
  background:var(--paper-2);color:var(--green-d);border:1px solid var(--tan-d);border-radius:5px;
  font-family:var(--font);font-size:.7rem;font-weight:700}
.sc-more:active{background:var(--tan)}

/* 하단 시트 (모바일 "더보기") */
#sheet-scrim{position:fixed;inset:0;background:rgba(31,24,12,.4);z-index:1490;opacity:0;
  pointer-events:none;transition:opacity .22s ease}
#sheet-scrim.show{opacity:1;pointer-events:auto}
#sheet{position:fixed;left:0;right:0;bottom:0;z-index:1500;
  background:var(--card);border-radius:18px 18px 0 0;box-shadow:0 -8px 30px rgba(31,24,12,.28);
  transform:translateY(100%);transition:transform .28s cubic-bezier(.22,1,.36,1);
  max-height:78dvh;overflow-y:auto;padding:.4rem 1.1rem calc(1.2rem + env(safe-area-inset-bottom));
  -webkit-overflow-scrolling:touch}
#sheet.show{transform:none}
.sheet-grip{width:40px;height:4px;border-radius:2px;background:var(--tan-d);margin:.55rem auto .2rem}
.sheet-close{position:sticky;top:0;float:right;margin:-.2rem -.3rem .2rem 0;padding:.3rem .6rem;cursor:none;
  background:rgba(31,24,12,.5);color:#fff;border:none;border-radius:20px;font-size:.66rem;font-weight:700;font-family:var(--font)}
.sheet-title{display:flex;align-items:center;gap:.45rem;font-size:.98rem;font-weight:800;color:var(--ink);
  margin:.2rem 0 .3rem;line-height:1.25}
.sheet-title .sheet-jp{font-size:.66rem;font-weight:600;color:var(--ink3)}

/* 스즈메 커서 — 마우스를 따라다님 */
#suzume-cursor{position:fixed;top:0;left:0;width:46px;height:46px;border-radius:50%;
  background-size:cover;background-position:center 16%;
  border:2.5px solid var(--card);box-shadow:0 3px 10px rgba(0,0,0,.35),0 0 0 1.5px var(--green-d);
  pointer-events:none;z-index:99999;opacity:0;
  transition:transform .13s ease-out, opacity .25s ease, scale .12s ease;will-change:transform}
#suzume-cursor.show{opacity:1}
#suzume-dot{position:fixed;top:0;left:0;width:7px;height:7px;border-radius:50%;
  background:var(--red);pointer-events:none;z-index:99999;transform:translate(-50%,-50%);opacity:0;
  box-shadow:0 0 0 2px rgba(253,248,236,.9)}
#suzume-dot.show{opacity:1}
@media (hover:none){#suzume-cursor,#suzume-dot{display:none}
  body,a,.stop-card,.sc-maplink{cursor:auto}}
@media (prefers-reduced-motion:reduce){
  body,a,.stop-card{cursor:auto}
  #suzume-cursor,#suzume-dot{display:none}}

/* ===== 모바일 (iPhone 메인) — 세로 스택: 지도 위 / 리스트 아래 ===== */
@media (max-width:768px){
  body{cursor:auto}                                  /* 터치: 기본 커서 */
  header{padding:calc(.55rem + env(safe-area-inset-top)) .9rem .55rem;gap:.6rem;
         background-size:100% 6px,100% 6px,auto}
  .hd-icon{width:40px;height:40px}
  .hd-title{font-size:.95rem;white-space:normal;line-height:1.15}
  .hd-sub{font-size:.62rem;margin-top:.12rem}
  .hd-route-btn{padding:.42rem .7rem;font-size:.66rem}
  .layout{flex-direction:column}
  /* 지도가 남는 공간을 채우고, 카드 영역은 카드 높이만큼만 차지 → 카드 항상 온전히 보임 */
  #map{flex:1;width:100%;min-height:170px;border-bottom:2px solid var(--tan-d)}
  .sidebar{width:100%;flex:none;min-height:0;border-left:none}
  .sb-head{padding:.5rem .9rem .4rem}
  .sb-head-sub{display:none}
  .stop-card:hover{transform:none}                   /* 터치엔 호버 이동 불필요 */

  /* ===== 리스트 → 가로 스와이프 캐러셀 (가로 스크롤만, 세로 스크롤 없음) ===== */
  .itinerary{flex:none;flex-direction:row;align-items:flex-start;overflow-x:auto;overflow-y:hidden;gap:0;
    padding:.5rem calc(.7rem + env(safe-area-inset-right)) calc(.5rem + env(safe-area-inset-bottom)) calc(.7rem + env(safe-area-inset-left));
    scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .itinerary::-webkit-scrollbar{display:none}
  .transit-connector{display:none}                   /* 가로에선 연결선 숨김(카드 안 인라인으로 대체) */
  .itinerary>.stop-card{flex:0 0 88vw;max-width:420px;height:auto;overflow:visible;  /* 세로 스크롤 X — 자연 높이 */
    scroll-snap-align:center;margin-right:.7rem}
  .itinerary>.stop-card:last-of-type{margin-right:0}
  .accom-card{flex:0 0 88vw;max-width:420px;height:auto;overflow:visible;scroll-snap-align:center;margin-left:.7rem}
  .sc-transit-inline{display:flex;align-items:center;gap:.35rem;
    font-size:.66rem;color:var(--ink3);font-weight:600;margin-bottom:.35rem}
  .sc-img{height:156px}.sc-img img{height:156px}
  .sc-body{padding:.65rem .8rem .7rem}
  .sc-detail{display:none}          /* 모바일: 인라인 상세 숨김 → 더보기 시트로 */
  .sc-more{display:flex;align-items:center;justify-content:center}  /* 더보기 버튼 노출 */
  .sc-actions .sc-maplink{flex:1;justify-content:center}            /* 자세히 보기 / 구글맵 반반 */
}
@media (max-width:768px) and (orientation:landscape){
  #map{height:52vh;height:52dvh}
}
</style>
</head>
<body>
<header>
  <div class="hd-icon" id="hdIcon"></div>
  <div class="hd-text">
    <div class="hd-title">거북이는 의외로 빨리 헤엄친다</div>
    <div class="hd-sub">재은님, 같이 영화 따라 걸으러 가요</div>
  </div>
  <a class="hd-route-btn" id="routeBtn" href="#" target="_blank" rel="noopener">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 2 11 13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    전체 경로
  </a>
</header>
<div class="layout">
  <div id="map"></div>
  <div class="sidebar">
    <div class="sb-head">
      <div class="sb-head-title">스즈메의 스파이 여정 — 전체 일정</div>
      <div class="sb-head-sub">카드 클릭 → 지도 이동 · 마커 클릭 → 장면 상세</div>
    </div>
    <div class="status-banner" id="statusBanner"></div>
    <div class="itinerary" id="itinerary"></div>
  </div>
</div>
<div id="sheet-scrim"></div>
<div id="sheet" role="dialog" aria-modal="true">
  <div class="sheet-grip"></div>
  <button id="sheetClose" class="sheet-close" aria-label="닫기">✕ 닫기</button>
  <div id="sheetBody"></div>
</div>
<div id="suzume-cursor"></div>
<div id="suzume-dot"></div>

/* 각 스팟의 구글맵 POI 조회 설정
   - poi:true  → Places(New)로 place_id를 찾아 정확한 POI 카드 링크 생성 + 마커도 구글 좌표에 정렬
   - poi:false → 폐업/지형(POI 없음) → 검증 좌표 핀 링크 (절대 안 깨짐)
   조회는 '검증 좌표 ±440m 박스'로 제한 → 엉뚱한 지역 POI 차단 */
const POICFG = {
  s1:{poi:false},                        // 나가세 인도교 (지형)
  s2:{poi:true,  q:'向ヶ崎公園 三浦市'},   // 공원 (실존)
  s3:{poi:false},                        // 백단계단 (지형)
  s4:{poi:true,  q:'ポパイ 三崎 ラーメン'},// 라면집 (실존)
  s5:{poi:false},                        // 커피숍 키 (폐업)
  s6:{poi:true,  q:'シーボニアマリーナ'},  // 마리나 (실존)
  s7:{poi:true,  q:'お好み焼 焼肉 千翠'},  // 千翠 (실존)
  s8:{poi:true,  q:'城南島海浜公園'}       // 해변공원 (실존)
};
// 기본 링크 = 정확 좌표 핀 (항상 동작). poi:true는 initMap에서 place_id 링크로 업그레이드.
STOPS.forEach(s=>{ s.gmapUrl=`https://www.google.com/maps/search/?api=1&query=${s.pos.lat}%2C${s.pos.lng}`; });


// 검증 좌표 ±440m 박스 안에서만 POI 조회 → 정확한 POI place_id 확보
async function resolvePOIs(){
  let Place;
  try{ ({Place}=await google.maps.importLibrary('places')); }
  catch(e){ console.warn('places 라이브러리 로드 실패:',e); return; }
  const dLat=0.0040, dLng=0.0048;
  await Promise.all(STOPS.map(async s=>{
    const cfg=POICFG[s.id]; if(!cfg||!cfg.poi) return;
    try{
      const {places}=await Place.searchByText({
        textQuery:cfg.q, fields:['location','displayName','id'],
        maxResultCount:1, language:'ja', region:'jp',
        locationRestriction:{west:s.pos.lng-dLng, east:s.pos.lng+dLng, south:s.pos.lat-dLat, north:s.pos.lat+dLat}
      });
      if(places && places.length && places[0].id){
        s.placeId=places[0].id;
        const nm=places[0].displayName || cfg.q;
        s.gmapUrl=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(nm)}&query_place_id=${places[0].id}`;
        if(places[0].location) s.pos={lat:places[0].location.lat(), lng:places[0].location.lng()};
      }
    }catch(e){ console.warn('POI 조회 실패:',s.id,cfg.q,e); }
  }));
}

let map, activeId=null;
const isMobile=()=>matchMedia('(max-width:768px)').matches;

let suppressScrollSync=false;   // 프로그램 스크롤 중 캐러셀 스크롤 동기화 억제

function setActive(id){
  if(activeId){const el=document.getElementById('si-'+activeId);if(el)el.classList.remove('active');}
  activeId=id;
  const el=document.getElementById('si-'+id);
  if(el){
    el.classList.add('active');
    suppressScrollSync=true;
    el.scrollIntoView({behavior:'smooth',block:'center',inline:'center'});  // 세로=가운데, 가로 캐러셀=가운데
    setTimeout(()=>{suppressScrollSync=false;},500);
  }
}
/* 마커·카드 공통: 활성화(가운데 스크롤·하이라이트) + 지도 이동 */
function focusStop(s){
  setActive(s.id);
  if(map && s._ll){ map.panTo(s._ll); map.setZoom(Math.max(map.getZoom()||0,16)); }
}

/* 하단 시트 — "더보기"로 장면·장소·현장 표시 (모바일) */
function openSheet(id){
  const s=STOPS.find(x=>x.id===id); if(!s) return;
  const body=document.getElementById('sheetBody');
  if(body) body.innerHTML=`<div class="sheet-title"><span class="sc-num ${s.numCls}">${s.num}</span>${s.name} <span class="sheet-jp">${s.jp}</span></div>${detailInner(s)}`;
  document.getElementById('sheet')?.classList.add('show');
  document.getElementById('sheet-scrim')?.classList.add('show');
}
function closeSheet(){
  document.getElementById('sheet')?.classList.remove('show');
  document.getElementById('sheet-scrim')?.classList.remove('show');
}
(function(){
  document.getElementById('sheetClose')?.addEventListener('click',closeSheet);
  document.getElementById('sheet-scrim')?.addEventListener('click',closeSheet);
  addEventListener('keydown',e=>{ if(e.key==='Escape') closeSheet(); });
})();

function defineHtmlMarker(OverlayView){
  return class HtmlMarker extends OverlayView{
    constructor(pos,html,onClick){super();this.pos=pos;this.html=html;this.onClick=onClick;}
    onAdd(){
      this.el=document.createElement('div');
      this.el.style.cssText='position:absolute;cursor:pointer;z-index:1';
      this.el.innerHTML=this.html;
      this.el.addEventListener('click',e=>{e.stopPropagation();this.onClick();});
      this.getPanes().overlayMouseTarget.appendChild(this.el);
    }
    draw(){
      const p=this.getProjection().fromLatLngToDivPixel(this.pos);
      if(p&&this.el){this.el.style.left=(p.x-14)+'px';this.el.style.top=(p.y-36)+'px';}
    }
    onRemove(){if(this.el){this.el.remove();this.el=null;}}
  };
}

/* 상세 섹션(🎬 장면 / 📍 장소 / 👁 현장) — 카드 인라인(데스크톱) & 하단 시트(모바일) 공용 */
function detailInner(s){
  const d=DETAIL[s.id]||{};
  const sec=(cls,h,b)=>b?`<div class="pop-sec ${cls}"><span class="pop-sec-h">${h}</span><div class="pop-sec-b">${b}</div></div>`:'';
  return sec('scene','🎬 어떤 장면',d.scene)+sec('','📍 어떤 장소',d.place)+sec('','👁 현장 모습',d.view);
}
function detailSectionsHtml(s){
  const inner=detailInner(s);
  return inner?`<div class="sc-detail">${inner}</div>`:'';
}

/* 웜톤 지도 스타일 (파란 물 → 세이지/세피아, 크림 육지) */
const WARM_MAP=[
  {elementType:'geometry',stylers:[{color:'#ece2cb'}]},
  {elementType:'labels.text.fill',stylers:[{color:'#6b5d43'}]},
  {elementType:'labels.text.stroke',stylers:[{color:'#f4eedd'},{weight:2}]},
  {featureType:'landscape.natural',elementType:'geometry',stylers:[{color:'#e6dcc2'}]},
  {featureType:'poi',elementType:'geometry',stylers:[{color:'#e2d8bf'}]},
  {featureType:'poi',elementType:'labels.text.fill',stylers:[{color:'#8a7a58'}]},
  {featureType:'poi.park',elementType:'geometry',stylers:[{color:'#cdd9b0'}]},
  {featureType:'poi.park',elementType:'labels.text.fill',stylers:[{color:'#5d7544'}]},
  {featureType:'road',elementType:'geometry',stylers:[{color:'#f7f1e2'}]},
  {featureType:'road',elementType:'geometry.stroke',stylers:[{color:'#e0d4b6'}]},
  {featureType:'road',elementType:'labels.text.fill',stylers:[{color:'#9b8a63'}]},
  {featureType:'road.highway',elementType:'geometry',stylers:[{color:'#f0dcac'}]},
  {featureType:'road.highway',elementType:'geometry.stroke',stylers:[{color:'#dcc689'}]},
  {featureType:'transit',elementType:'geometry',stylers:[{color:'#ddd0b4'}]},
  {featureType:'transit.station',elementType:'labels.text.fill',stylers:[{color:'#8a7a58'}]},
  {featureType:'administrative',elementType:'geometry.stroke',stylers:[{color:'#c9ba94'}]},
  {featureType:'administrative.land_parcel',stylers:[{visibility:'off'}]},
  {featureType:'water',elementType:'geometry',stylers:[{color:'#b7ccc3'}]},
  {featureType:'water',elementType:'labels.text.fill',stylers:[{color:'#7c9089'}]}
];

async function initMap(){
  const {Map,InfoWindow,OverlayView}=await google.maps.importLibrary('maps');
  const {DirectionsService,DirectionsRenderer,TravelMode}=await google.maps.importLibrary('routes');
  const HtmlMarker=defineHtmlMarker(OverlayView);

  map=new Map(document.getElementById('map'),{
    center:{lat:35.30,lng:139.70}, zoom:10, styles:WARM_MAP,
    zoomControl:true, zoomControlOptions:{position:google.maps.ControlPosition.RIGHT_BOTTOM},
    mapTypeControl:false, streetViewControl:false, fullscreenControl:false, gestureHandling:'greedy'
  });

  /* POI place_id 해석 → 링크/좌표 확정 후 마커 배치 */
  await resolvePOIs();
  STOPS.forEach(s=>{ const a=document.querySelector('#si-'+s.id+' .sc-maplink'); if(a) a.href=s.gmapUrl; });

  /* 마커 배치 (각 스톱이 자기 좌표 소유 → 카드↔마커 꼬임 없음) */
  const bounds=new google.maps.LatLngBounds();
  STOPS.forEach(s=>{
    const ll=new google.maps.LatLng(s.pos.lat,s.pos.lng);
    const pinHtml=`<div class="ap-pin"><div class="ap-pin-head ${s.numCls}"><span class="ap-pin-label">${s.num}</span></div><div class="ap-pin-tail ${s.numCls}"></div></div>`;
    const marker=new HtmlMarker(ll,pinHtml,()=>focusStop(s));
    marker.setMap(map);
    s.marker=marker; s._ll=ll;
    bounds.extend(ll);
  });
  map.fitBounds(bounds,60);

  /* Directions 도로 경로 */
  const ds=new DirectionsService();
  const dr=new DirectionsRenderer({suppressMarkers:true, preserveViewport:true, map,
    polylineOptions:{strokeColor:'#c2402a', strokeOpacity:.85, strokeWeight:5}});
  ds.route({
    origin:STOPS[0]._ll, destination:STOPS[STOPS.length-1]._ll,
    waypoints:STOPS.slice(1,-1).map(s=>({location:s._ll, stopover:true})),
    travelMode:TravelMode.DRIVING, optimizeWaypoints:false
  },(res,status)=>{
    if(status==='OK') dr.setDirections(res);
    else { console.warn('Directions:',status); new google.maps.Polyline({path:STOPS.map(s=>s._ll),map,strokeColor:'#c2402a',strokeOpacity:.6,strokeWeight:3}); }
  });

  /* 헤더 구글맵 경로 버튼 — 정확 좌표 기준 */
  document.getElementById('routeBtn').href=
    'https://www.google.com/maps/dir/'+STOPS.map(s=>`${s.pos.lat},${s.pos.lng}`).join('/');
}

/* =========================================================
   사이드바
   ========================================================= */
function buildSidebar(){
  const itin=document.getElementById('itinerary');
  STOPS.forEach(s=>{
    if(s.transit){
      const tr=document.createElement('div');tr.className='transit-connector';
      tr.innerHTML=`<div class="tc-line-col"><div class="tc-dot"></div><div class="tc-line"></div><div class="tc-dot"></div></div>
        <div class="tc-pill"><span class="tc-mode">${s.transit.mode}</span><span class="tc-detail">${s.transit.detail}</span><span class="tc-time">${s.transit.time}</span></div>`;
      itin.appendChild(tr);
    }
    const card=document.createElement('div');card.className='stop-card';card.id='si-'+s.id;
    const tagsHtml=s.tags.map(t=>{
      const cls=t.includes('식당')||t.includes('추천')?'food':t.includes('카페')||t.includes('음료')?'cafe':t.includes('전망')||t.includes('공원')||t.includes('비행기')||t.includes('해변')?'view':'film';
      return `<span class="sc-tag ${cls}">${t}</span>`;
    }).join('');
    const imgHtml=SCENE_IMGS[s.imgKey]?`<div class="sc-img"><img src="${SCENE_IMGS[s.imgKey]}" alt="${s.name}" onerror="this.parentElement.style.display='none'"/><div class="sc-img-overlay"><span class="sc-scene-label">영화 속 장면</span><div class="sc-scene-text">${s.sceneLabel}</div></div></div>`:'';
    const transitInline=s.transit?`<div class="sc-transit-inline">${s.transit.mode} ${s.transit.detail} · ${s.transit.time}</div>`:'';
    card.innerHTML=`<div class="sc-time-bar ${s.numCls}"><span class="sc-time">⏰ ${s.time}</span><span class="sc-duration">${s.duration}</span></div>
      ${imgHtml}
      <div class="sc-body">
        ${transitInline}
        <div class="sc-num-row"><div class="sc-num ${s.numCls}">${s.num}</div><div><div class="sc-name">${s.name}</div><div class="sc-jp">${s.jp}</div></div></div>
        ${tagsHtml?`<div class="sc-tags">${tagsHtml}</div>`:''}
        ${s.food?`<div class="sc-food">${s.food}</div>`:''}
        ${detailSectionsHtml(s)}
        <div class="sc-actions">
          <button class="sc-more" type="button">🎬 자세히 보기</button>
          <a class="sc-maplink" href="${s.gmapUrl}" target="_blank" rel="noopener">📍 구글맵</a>
        </div>
      </div>`;
    card.querySelector('.sc-more')?.addEventListener('click',e=>{ e.stopPropagation(); openSheet(s.id); });
    card.addEventListener('click',e=>{
      if(e.target.tagName==='A'||e.target.closest('a')||e.target.closest('.sc-more')) return;
      focusStop(s);
    });
    itin.appendChild(card);
  });
  const accom=document.createElement('div');accom.className='accom-card';
  accom.innerHTML=`<div class="accom-title">🏨 숙박 추천</div>
    <div class="accom-row"><span class="accom-name">당일 귀국</span> — 조난지마 → 하네다 버스 20분, 국제선 이용</div>
    <div class="accom-row"><span class="accom-name">1박 추천</span> — 미사키항 게스트하우스 / 미우라카이간 리조트 펜션</div>`;
  itin.appendChild(accom);
}

buildSidebar();
initMap();

/* ===== 모바일 캐러셀 스와이프 → 가운데 카드 하이라이트 + 지도 이동 ===== */
(function(){
  const it=document.getElementById('itinerary');
  if(!it) return;
  let t;
  it.addEventListener('scroll',()=>{
    if(!isMobile()||suppressScrollSync) return;
    clearTimeout(t);
    t=setTimeout(()=>{
      const itR=it.getBoundingClientRect(), mid=itR.left+itR.width/2;
      let best=null,bd=1e9;
      STOPS.forEach(s=>{
        const el=document.getElementById('si-'+s.id); if(!el) return;
        const r=el.getBoundingClientRect(), c=r.left+r.width/2, d=Math.abs(c-mid);
        if(d<bd){bd=d;best=s;}
      });
      if(best && best.id!==activeId){
        if(activeId){const p=document.getElementById('si-'+activeId);if(p)p.classList.remove('active');}
        activeId=best.id;
        document.getElementById('si-'+best.id)?.classList.add('active');
        if(map && best._ll) map.panTo(best._ll);   // 스크롤 재유발 없이 지도만 이동
      }
    },120);
  },{passive:true});
})();

/* ===== 스즈메 얼굴 커서 추적 ===== */
(function(){
  const face=document.getElementById('suzume-cursor');
  const dot=document.getElementById('suzume-dot');
  const hdIcon=document.getElementById('hdIcon');
  if(hdIcon) hdIcon.style.backgroundImage=`url(${SUZUME_FACE})`;
  if(!face||!dot) return;
  face.style.backgroundImage=`url(${SUZUME_FACE})`;
  const OFF=14;            // 포인터로부터 오른쪽-아래 고정 오프셋(px)
  let px=innerWidth/2, shown=false;
  addEventListener('mousemove',e=>{
    const tx=e.clientX, ty=e.clientY;
    // 정확 지점 = 빨간 점
    dot.style.transform=`translate(${tx}px,${ty}px) translate(-50%,-50%)`;
    // 스즈메 얼굴 = 항상 포인터의 오른쪽 아래 (좌상단 기준 +OFF). CSS transition이 부드럽게 따라옴.
    const dx=tx-px; px=tx;
    const ang=Math.max(-14,Math.min(14,dx*0.5));
    face.style.transform=`translate(${tx+OFF}px,${ty+OFF}px) rotate(${ang}deg)`;
    if(!shown){shown=true;face.classList.add('show');dot.classList.add('show');}
    const interactive=e.target&&e.target.closest&&e.target.closest('a,.stop-card,.hd-route-btn,button,.ap-pin');
    face.style.scale=interactive?'1.12':'1';
  });
  addEventListener('mouseleave',()=>{face.classList.remove('show');dot.classList.remove('show');shown=false;});
})();
